<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECURE ARCHIVE // THE DIMA LEAKS</title>
    <style>
        /* --- СТИЛИ (CSS) --- */
        body {
            background-color: #050505;
            color: #00ff41; /* Хакерский зеленый */
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Эффект старого монитора */
        body::before {
            content: " ";
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 10001;
            opacity: 0.15;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            transition: filter 0.5s ease;
        }

        /* Экран блокировки */
        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.98);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .login-box {
            background: #161b22;
            padding: 40px;
            border: 2px solid #ff4444;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 68, 68, 0.3);
        }

        .login-box h2 {
            color: #ff4444;
            margin-top: 0;
            letter-spacing: 3px;
        }

        .login-box input {
            display: block;
            width: 250px;
            margin: 15px auto;
            padding: 12px;
            background: #0d1117;
            border: 1px solid #30363d;
            color: #00ff41;
            font-family: inherit;
            text-align: center;
            outline: none;
        }

        .login-box input:focus { border-color: #ff4444; }

        .btn-access {
            background: #ff4444;
            color: white;
            border: none;
            padding: 12px 40px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
            text-transform: uppercase;
        }

        .btn-access:hover { background: #cc0000; }

        .content-blur {
            filter: blur(15px);
            pointer-events: none;
        }

        /* Стили поиска */
        h1 {
            color: #ff4444;
            border-bottom: 2px solid #30363d;
            padding-bottom: 10px;
            font-size: 24px;
            text-transform: uppercase;
        }

        .search-section {
            display: flex;
            gap: 10px;
            margin: 30px 0;
        }

        .search-section input {
            flex-grow: 1;
            padding: 15px;
            background: #0d1117;
            border: 1px solid #30363d;
            color: #00ff41;
            font-family: inherit;
        }

        .search-btn {
            background: #1f6feb;
            color: white;
            border: none;
            padding: 0 25px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
        }

        /* Результаты как на скриншоте */
        .result-item {
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #21262d;
        }

        .result-title {
            color: #38bdf8; /* Голубой как на скриншоте */
            font-size: 19px;
            text-decoration: underline;
            cursor: pointer;
            font-weight: bold;
        }

        .result-snippet {
            margin-top: 8px;
            font-size: 14px;
            color: #8b949e;
            line-height: 1.4;
        }

        .highlight { background: #ffff00; color: #000; }

        /* Окно с мемом */
        #meme-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 10002;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>ACCESS RESTRICTED</h2>
            <p style="font-size: 12px; color: #8b949e;">ENTER CREDENTIALS FROM TELEGRAM BOT</p>
            <input type="text" id="user-login" placeholder="ЛОГИН">
            <input type="password" id="user-pass" placeholder="ПАРОЛЬ">
            <button class="btn-access" onclick="checkAccess()">ВЗЛОМАТЬ ДОСТУП</button>
            <p style="font-size: 11px; margin-top: 20px;">
                <a href="#" style="color: #58a6ff;">ЗАБЫЛИ ПАРОЛЬ? ОБРАТИТЕСЬ К БОТУ</a>
            </p>
        </div>
    </div>

    <div class="container content-blur" id="main-content">
        <h1>[ СОВЕКРЕТНО ] АРХИВ_СТЕКЛОПАКЕТА.db</h1>

        <div class="search-section">
            <input type="text" id="searchInput" placeholder="Введите имя файла или тег...">
            <button class="search-btn" onclick="performSearch()">SEARCH</button>
        </div>

        <div id="resultsInfo" style="font-size: 12px; color: #8b949e; margin-bottom: 20px;">
            Статус: Ожидание ввода...
        </div>

        <div id="resultsContainer"></div>
    </div>

    <div id="meme-overlay" onclick="closeMeme()">
        <h1 style="color: #ff4444; font-size: 50px;">ОШИБКА 666</h1>
        <p style="color: white;">СТЕКЛОПАКЕТ ПОВРЕЖДЕН!</p>
        <p style="color: #444;">(Кликни, чтобы вернуться)</p>
    </div>

    <script>
        /* --- ЛОГИКА (JS) --- */
        let database = [];

        // 1. ПРОВЕРКА ПАРОЛЯ
        function checkAccess() {
            const login = document.getElementById('user-login').value;
            const pass = document.getElementById('user-pass').value;

            // Секретное правило: пускать если в пароле есть "dima"
            // В боте выдавай пароли типа DIMA_1234
            if (pass.toLowerCase().includes("dima") || pass === "1337") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-content').classList.remove('content-blur');
                localStorage.setItem('archive_access', 'true');
            } else {
                alert("ACCESS DENIED: INVALID KEY");
            }
        }

        // 2. ЗАГРУЗКА БАЗЫ (из твоего скрипта python)
        async function loadDatabase() {
            try {
                const response = await fetch('database.json');
                if (!response.ok) throw new Error();
                database = await response.json();
                document.getElementById('resultsInfo').innerText = `Индекс: ${database.length} файлов доступно.`;
                renderResults(database, "");
            } catch (e) {
                document.getElementById('resultsInfo').innerText = "ОШИБКА: database.json не найден!";
            }
        }

        // 3. ПОИСК
        function performSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            
            // Шанс на пасхалку
            if (Math.random() < 0.1) { triggerMeme(); return; }

            const filtered = database.filter(item => 
                item.name.toLowerCase().includes(query) || 
                item.id.toLowerCase().includes(query)
            );
            renderResults(filtered, query);
        }

        // 4. ОТРИСОВКА (Стиль скриншота Минюста)
        function renderResults(results, query) {
            const container = document.getElementById('resultsContainer');
            container.innerHTML = '';
            
            results.forEach(item => {
                const div = document.createElement('div');
                div.className = 'result-item';
                
                let displayName = item.name;
                if (query) {
                    const regex = new RegExp(`(${query})`, 'gi');
                    displayName = displayName.replace(regex, '<span class="highlight">$1</span>');
                }

                div.innerHTML = `
                    <div style="margin-bottom: 5px;">
                        <a class="result-title" href="${item.url}" target="_blank">${item.id}.pdf</a>
                        <span style="color: #8b949e;"> - ${item.dataset}</span>
                    </div>
                    <div class="result-snippet">
                        From: "Dmitriy Steklopaket" To: "The Internet" Subject: Classified Leak<br>
                        Date: ${item.date} | Filename: ${displayName} | Size: ${item.size}<br>
                        <em>Attached materials for investigation. Authorization required for physical copy.</em>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function triggerMeme() { document.getElementById('meme-overlay').style.display = 'flex'; }
        function closeMeme() { document.getElementById('meme-overlay').style.display = 'none'; }

        // ПРИ ЗАГРУЗКЕ
        window.onload = () => {
            loadDatabase();
            // Если уже входил ранее — пускаем без пароля
            if (localStorage.getItem('archive_access') === 'true') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-content').classList.remove('content-blur');
            }
        };

        // Поиск по Enter
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch();
        });
    </script>
</body>
</html>
